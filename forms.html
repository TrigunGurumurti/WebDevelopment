<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1><center>Forms in HTML</center></h1>
    <form>
    <div>
        <!-- Text input -->
        <label for="fullname">Enter fullname:</label>
        <input id="fullname" type="text" placeholder="Enter fullname">
    </div>

    <br>

    <div>
        <!-- Number input with min -->
        <label for="age">Age:</label>
        <input id="age" type="number" placeholder="Enter age" min="0">
    </div>
    
    <br>

    <div>
        <!-- Password input -->
        <label>Password:</label>
        <input type="password">
    </div>

    <br>

    <div>
        <!-- Email input -->
        <label>Email:</label>
        <input type="email">
    </div>   

    <br>

    <div>
        <!-- url input -->
        <label>URL:</label>
        <input type="url">
    </div>

    <br>

    <div>
        <!-- Phone number input -->
        <label>Phone number:</label>
        <input type="tel">
    </div>

    <br>

    <div>
        <!-- Range input -->
        <label>Range:</label>
        <input type="range" min="18" max="25">
    </div>

    <br>

    <div>
        <!-- Date input -->
        <label>Date:</label>
        <input type="date">
    </div>

    <br>

    <div>
        <!-- Time input -->
        <label>Time:</label>
        <input type="time">
    </div>

    <br>

    <div>
        <!-- Month input -->
        <label>Month:</label>
        <input type="month">
    </div>

    <br>

    <div>
        <!-- Week input -->
        <label>Week:</label>
        <input type="week">
    </div>

    <br>

    <div>
        <!-- Color input -->
        <label>Color:</label>
        <input type="color">
    </div>

    <br>

    <div>
        <!-- Checkbox input -->
        <label>Select your favourite subjects:</label>
        <input type="checkbox">Mathematics
        <input type="checkbox">Computer Science
    </div>

    <br>

    <div>
        <!-- Radio input -->
        <label>Select your favourite subject:</label>
        <input name="subject" type="radio">Mathematics
        <input name="subject" type="radio">Computer Science
    </div> 
    
    <br>

    <div>
        <!-- File input -->
        <label>File:</label>
        <input type="file">
    </div>

    <br>

    <div>
        <!-- Text area input -->
        <label>Description:</label>
        <textarea rows="5" cols="50"></textarea>
    </div>

    <br>

    <div>
        <!-- Select dropdown -->
        <label>City:</label>
        <select>
            <option value="Bengaluru">Bengaluru</option>
            <option value="Delhi">Delhi</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Chennai">Chennai</option>
        </select>
    </div>

    <br> 

    <button type="reset">Reset</button>

    <br><br>

    <button type="submit">Submit</button>
    </form>
</body>
</html>
