<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table
        {
            width:100%;
            border-collapse: collapse;
        }
        th,td
        {
            border:1px solid black;
            padding:8px;
            text-align: left;
        }
        th
        {
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <h1><center>Tables in HTML</center></h1>
    <table>
    <thead>   
        <tr>
            <th>Name</th>
            <th>Section</th>
            <th>Grade</th>
        </tr>
    </thead>   
    <tbody>
        <tr>
            <td>Trigun</td>
            <td>K</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>Vikas</td>
            <td>J</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Anand</td>
            <td>I</td>
            <td>B</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
